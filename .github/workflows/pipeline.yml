name: Terraform piepline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: iac/module-wise-iac/main

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show selected pipeline
        run: |
          echo "Selected pipeline:"
          echo "${{ github.event.inputs.action }}"

      - name: Run Plan
        if: github.event.inputs.action == 'plan'
        run: echo "Running Terraform plan"

      - name: Run Apply
        if: github.event.inputs.action == 'apply'
        run: echo "Running Terraform apply"

      - name: Run Destroy
        if: github.event.inputs.action == 'destroy'
        run: echo "Running Terraform destroy"ithub.event.inputs.pipeline == 'destroy'
