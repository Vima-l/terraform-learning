name: Terraform piepline
#this tells on what action this pipeline should run
#workflow dispatch means manully selecting pipeline to run based on branch
on:
  workflow_dispatch:
    inputs:                                                         #UI paramter
      action:
        description: "Select Terraform action"
        required: true
        type: choice                                                #dropdown for option
        options:
          - plan
          - apply
          - destroy

jobs:                                                               # a pipeline
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: iac/module-wise-iac/main

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::102156246557:role/github-role-for-oidc
          aws-region: us-east-1

      - name: Check command execution
        run: aws sts get-caller-identity

      - name: Show selected pipeline
        run: |
          echo "Selected pipeline:"
          echo "${{ github.event.inputs.action }}"

      - name: Run Plan
        if: github.event.inputs.action == 'plan'
        run: echo "Running Terraform plan"

      - name: Run Apply
        if: github.event.inputs.action == 'apply'
        run: echo "Running Terraform apply"

      - name: Run Destroy
        if: github.event.inputs.action == 'destroy'
        run: echo "Running Terraform destroy"
